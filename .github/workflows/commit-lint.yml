name: Commit Lint

# Validates that every commit in a pull request follows the Conventional Commits
# spec. This is the server-side backstop for the local pre-commit hook: it runs
# for everyone, regardless of whether they ran `pre-commit install` locally.
# Make it mandatory via branch protection (require this check to pass before merge).
on:
  pull_request:

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webiny/action-conventional-commits@v1.3.0
        with:
          # Keep this list in sync with the `args:` in .pre-commit-config.yaml.
          allowed-commit-types: "build,chore,ci,docs,feat,fix,perf,refactor,revert,style,test,wip"
